openapi: 3.0.3
info:
  title: Velo API
  version: 4.1.0
  description: |
    Project Tool for AI.

    ## Field Naming Convention
    **All request bodies use camelCase** (e.g. `ministryCode`, `fiscalYear`, `fundingSource`).
    **All responses use snake_case** DB column names (e.g. `project_name`, `ministry_code`).
    This is intentional — the controller maps camelCase input to snake_case DB fields.

    ## Authentication
    Two methods:
    - **Cookie SSO**: Sign in via `GET /auth/google`, then include `X-CSRF-Token` header on writes.
    - **API Key**: Include `X-API-Key: velo_xxx` or `Authorization: Bearer velo_xxx` header. No CSRF needed.

    API key actions are attributed to the key owner and flagged as `api_key` in the audit log.

    ## Role-Based Access Control
    Four roles with multi-role support:
    - **user**: Read-only viewer — can see projects, dashboards, and data but cannot modify anything
    - **runner**: Can DO work — velocity game, SharePoint, Git operations, run audits, edit OPEN projects (no active members), and (per project) clone/claim
    - **project_lead**: Can SET UP work — create/edit/delete projects, modules, budgets, leads, links, Applications & Contracts, persons, canvas + everything runner can do
    - **admin**: System administration — user management, settings, PAT management, project clone-policy + everything project_lead can do

    Users can hold multiple roles simultaneously. Admin role implicitly grants all permissions.
    API key access enforces the same role restrictions as browser login.

    ## Project Membership & Locks (v4.0)
    A project with **zero** active members is **open** — any user with `runner`, `project_lead`, or `admin` role may edit it.
    A project with **≥1** active member is **claimed** — only its members (and admins) may edit it. Members hold one of two roles:
    - **owner**: full control — add/remove members, lock, rename version, transfer ownership, complete challenges, delete the project
    - **collaborator**: may edit (when unlocked) and make velocity moves; cannot manage membership

    A project may be **locked** by any owner. While locked, only the locker (and admins) may mutate the project, its
    modules, sub-resources, and velocity board. Admins may force-unlock with `force=true`; force-unlocks write a
    `project_update` of type `decision` so the original locker can see the override.

    ## Cloning & Versions (v4.0)
    Top-level projects may be cloned by any `runner+`. Cloning is **single-level** — clones cannot themselves be cloned
    (`422 CLONE_OF_CLONE`). An admin may disable cloning of a specific project (`PATCH /projects/{id}/clone-policy`),
    in which case clone attempts return `403 CLONE_DISABLED`. Clones inherit metadata, modules, and (optionally) links/budgets;
    velocity state, members, audit history, and dates reset. The cloner becomes the sole owner of the clone.
    `project_code` is auto-suffixed `-v1`, `-v2`, …; `project_version_label` is renameable by owners.

    Use `GET /projects/{id}/cluster` to retrieve the parent + all clones of a top-level project.

    ## Optimistic Concurrency: `If-Match` (v4.0)
    Every project response includes `project_revision` (integer). Every velocity step response includes `step_revision`.
    Both auto-increment on every `UPDATE` via DB triggers. Clients may include `If-Match: <revision>` on writes:
    - matching → write succeeds; revision bumps
    - mismatch → `412 PRECONDITION_FAILED` with `details: [{ field: "currentRevision", message: "<n>" }]`
    The header is **advisory** — writes without it succeed (with last-write-wins risk).
    Designed to let multiple AI agents race on the same step without clobbering each other.

    ## Idempotency: `Idempotency-Key` (v4.0)
    Send `Idempotency-Key: <uuid>` on any non-`GET` request. The server caches successful (`2xx`) responses for **24 hours**
    keyed on `(uuid, method, path, request-body-hash)`:
    - Re-sending the same key + body returns the cached response with header `Idempotency-Replayed: true`.
    - Re-sending the same key with a **different** body returns `422 IDEMPOTENCY_KEY_REUSED`.
    Designed for agent retry-after-network-failure paths.

servers:
  - url: http://localhost:3001/api/v1

security:
  - apiKeyHeader: []
  - apiKeyBearer: []
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth: { type: apiKey, in: cookie, name: access_token }
    apiKeyHeader: { type: apiKey, in: header, name: X-API-Key }
    apiKeyBearer: { type: http, scheme: bearer }

  schemas:
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code: { type: string, example: "VALIDATION_ERROR" }
            message: { type: string, example: "Invalid input" }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }
            url: { type: string }
            method: { type: string }
            timestamp: { type: string, format: date-time }

    ProjectInput:
      type: object
      required: [name, ministryCode]
      properties:
        projectCode: { type: string, maxLength: 50, example: "PRJ-0400" }
        name: { type: string, maxLength: 500, example: "My New Project" }
        description: { type: string, example: "Project description here" }
        ministryCode:
          type: string
          description: "Ministry/department short code"
          example: "TI"
          enum: [AE, AU, AI, ACSW, ALSS, CFS, CPE, EDC, EM, EPA, EC, FP, HSHS, IR, INFRA, JETI, JUS, MHA, MA, PPHS, PSES, PSC, SARTR, TI, TS, TEC, TBF]
        status:
          type: string
          default: discovery
          enum: [discovery, requirements, development, testing, client_review, client_acceptance, completion, on_hold, cancelled]
        startDate: { type: string, format: date, example: "2026-04-01" }
        endDate: { type: string, format: date, example: "2027-03-31" }
        goLiveDateType:
          type: string
          nullable: true
          enum: [legislative, mandated, announced, objective]
        percentComplete: { type: integer, minimum: 0, maximum: 100, default: 0 }
        priority: { type: string, example: "High" }
        demandNumber: { type: string, example: "DMND0001234" }
        risk: { type: string }
        additionalInfo: { type: string }
        branch: { type: string, example: "Software Delivery" }
        isMissionCritical: { type: boolean, default: false, description: "Whether the project is mission-critical" }
        # ─── Challenge fields (project_lead/admin only) ───
        isChallenge:
          type: boolean
          default: false
          description: "Flag this project as a Challenge — appears on /challenges and is acceptable (cloneable) by runner+"
        challengePoints:
          type: integer
          minimum: 0
          maximum: 10000
          description: "Total points awarded to the winning acceptance's owner(s). Auto-derived from difficulty by the UI on save (easy=100, medium=250, hard=500, expert=1000), but accepted as an explicit value."
        challengeMaxDays:
          type: integer
          minimum: 1
          maximum: 30
          example: 5
          description: "Target completion window in days. Used to compute the 25% speed bonus when a winner is picked within the window."
        challengeDifficulty:
          type: string
          nullable: true
          enum: [easy, medium, hard, expert]
        challengeMaxAcceptances:
          type: integer
          minimum: 1
          maximum: 1000
          nullable: true
          description: "Cap on the number of acceptances (clones). NULL = unlimited; integer = first-come, first-served. Tri-state on update — omit the key to keep existing, send null to clear back to unlimited, send an integer to cap."

    ModuleInput:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 500, example: "Authentication Module" }
        description: { type: string }
        status:
          type: string
          default: requirements_gathering
          enum: [requirements_gathering, building, client_review, client_sign_off, delivered, closed, cancelled]
        startDate: { type: string, format: date, nullable: true }
        endDate: { type: string, format: date, nullable: true }
        percentComplete: { type: integer, minimum: 0, maximum: 100, default: 0 }
        sortOrder: { type: integer, default: 0 }
        plan: { type: string, description: "AI or manual plan notes" }
        progress: { type: string }
        blockers: { type: string }

    BudgetInput:
      type: object
      required: [fiscalYear, fundingSource, moneyType]
      properties:
        fiscalYear: { type: string, example: "FY26-27", description: "Fiscal year label" }
        fundingSource:
          type: string
          enum: [TI, Ministry, Mixed, Federal, Other]
          example: "TI"
        moneyType:
          type: string
          enum: [Salary, Operating, Capital]
          example: "Operating"
        amount: { type: number, minimum: 0, default: 0, example: 250000 }
        spent: { type: number, minimum: 0, default: 0, example: 50000 }
        notes: { type: string }

    LinkInput:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [github, confluence, jira, sharepoint, other]
          example: "github"
        url: { type: string, format: uri, example: "https://github.com/org/repo" }
        label: { type: string, example: "Main Repository" }
        description: { type: string }

    UpdateInput:
      type: object
      required: [content]
      properties:
        type:
          type: string
          default: progress
          enum: [progress, blocker, plan, risk, decision, milestone, ai_summary, audit_result]
        title: { type: string, example: "Sprint 3 Complete" }
        content: { type: string, example: "Completed user auth module and API endpoints." }
        contentJson: { type: object, description: "Structured JSON for AI-generated summaries" }
        moduleId: { type: string, format: uuid, nullable: true, description: "Link update to a specific module" }
        source:
          type: string
          default: manual
          enum: [manual, api, ai_audit, github_webhook, jira_sync, confluence_sync]

    LeadInput:
      type: object
      required: [name]
      properties:
        name: { type: string, example: "Jane Smith" }
        personId: { type: string, format: uuid, description: "Link to person table for typeahead lookup" }
        role:
          type: string
          default: team_member
          enum: [lead, delivery_director, delivery_manager, developer, business_analyst, qa_tester, designer, project_manager, product_owner, architect, data_analyst, devops, scrum_master, stakeholder, sponsor, team_member, other]
          example: "delivery_director"
        isPrimary: { type: boolean, default: false }
        isFte: { type: boolean, default: true }
        organization: { type: string, example: "CGI", description: "Contractor organization (if not FTE)" }

    DependencyInput:
      type: object
      required: [fromProjectId, toProjectId]
      properties:
        fromProjectId: { type: string, format: uuid }
        toProjectId: { type: string, format: uuid }
        type:
          type: string
          default: other
          enum: [finish_to_start, start_to_start, finish_to_finish, start_to_finish, other]
          example: "finish_to_start"
        label: { type: string, example: "Data feed dependency" }
        notes: { type: string }

    PersonInput:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string, example: "Jane Smith" }
        email: { type: string, format: email, example: "jane.smith@example.com" }
        githubHandle: { type: string, example: "@janesmith" }
        organization: { type: string, example: "CGI" }
        isFte: { type: boolean, default: true }
        notes: { type: string }

    ApiKeyInput:
      type: object
      required: [name]
      properties:
        name: { type: string, example: "Claude Code" }
        scopes:
          type: array
          items: { type: string, enum: [read, write] }
          default: [read, write]
        expiresAt: { type: string, format: date, nullable: true }

    ApplicationInput:
      type: object
      required: [name, applicationId]
      properties:
        applicationId: { type: string, maxLength: 50, example: "APP-0012", description: "Unique application identifier" }
        name: { type: string, maxLength: 500, example: "Wildfire Management System" }
        description: { type: string }
        owner: { type: string, example: "Forestry and Parks" }
        status:
          type: string
          default: active
          enum: [active, decommissioned, in_development, on_hold]
        environment: { type: string, enum: [production, staging, development, disaster_recovery] }
        url: { type: string, format: uri, example: "https://app.example.com" }
        notes: { type: string }

    ApplicationOutput:
      type: object
      properties:
        id: { type: string, format: uuid }
        application_id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        owner: { type: string, nullable: true }
        status: { type: string }
        environment: { type: string, nullable: true }
        url: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ContractInput:
      type: object
      required: [contractNumber, vendorName]
      properties:
        contractNumber: { type: string, maxLength: 100, example: "CON-2026-0045" }
        vendorName: { type: string, maxLength: 500, example: "CGI" }
        description: { type: string }
        startDate: { type: string, format: date, example: "2026-04-01" }
        endDate: { type: string, format: date, example: "2027-03-31" }
        value: { type: number, minimum: 0, example: 500000 }
        status:
          type: string
          default: active
          enum: [active, expired, terminated, pending]
        notes: { type: string }

    ContractOutput:
      type: object
      properties:
        id: { type: string, format: uuid }
        contract_number: { type: string }
        vendor_name: { type: string }
        description: { type: string, nullable: true }
        start_date: { type: string, format: date, nullable: true }
        end_date: { type: string, format: date, nullable: true }
        value: { type: number, nullable: true }
        status: { type: string }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectApplicationLink:
      type: object
      required: [applicationId]
      properties:
        applicationId: { type: string, format: uuid, description: "ID of the application to link" }
        relationship: { type: string, default: uses, enum: [uses, manages, replaces, integrates_with] }
        notes: { type: string }

    ProjectContractLink:
      type: object
      required: [contractId]
      properties:
        contractId: { type: string, format: uuid, description: "ID of the contract to link" }
        relationship: { type: string, default: funded_by, enum: [funded_by, delivered_under, staffing, licensing, maintenance, infrastructure, consulting, other] }
        notes: { type: string }

    # ─── Velocity Schemas ───

    VelocityMoveInput:
      type: object
      required: [status]
      description: Make a chess-clock move — transition a velocity step to a new status.
      properties:
        status:
          type: string
          enum: [not_started, ready_to_start, ai_working, human_working, ai_review, human_review, completed, blocked, hand_raised]
          description: |
            Target status for this move. Must be a valid transition from the current status.
            hand_raised = need help (yellow pulsing ring, 0 penalty). blocked = impediment (red ring, -10 pts).
        actor:
          type: string
          enum: [human, ai]
          description: Who is making this move.
        content:
          type: string
          maxLength: 10000
          description: Notes, instructions, or context for the next actor.
        contentJson:
          type: object
          description: Structured metadata (optional).
        attachments:
          type: array
          items:
            type: object
            properties:
              filename: { type: string }
              url: { type: string }
              type: { type: string }

    VelocityNoteInput:
      type: object
      required: [content]
      description: Add a note to a velocity step without changing status.
      properties:
        actor:
          type: string
          enum: [human, ai]
          default: human
        content:
          type: string
          minLength: 1
          maxLength: 10000
        contentJson:
          type: object
        attachments:
          type: array
          items:
            type: object
            properties:
              filename: { type: string }
              url: { type: string }
              type: { type: string }

    ProjectVelocityOverview:
      type: object
      description: Velocity data for a single module (used in dashboard heatmap).
      properties:
        pk_project: { type: string, format: uuid }
        project_name: { type: string }
        pk_module: { type: string, format: uuid }
        module_name: { type: string }
        steps:
          type: array
          items:
            type: object
            properties:
              pk_module_velocity: { type: string, format: uuid }
              step_name: { type: string, enum: [requirements, planning, architecture, prototyping, development, user_testing, user_acceptance, deployment] }
              step_order: { type: integer }
              status: { type: string, enum: [not_started, ready_to_start, ai_working, human_working, ai_review, human_review, completed, blocked] }
              current_actor: { type: string, enum: [human, ai], nullable: true }
              loop_count: { type: integer }
              turn_count: { type: integer }
              is_locked: { type: boolean }
              requires_human_approval: { type: boolean, description: "If true, AI cannot approve this step — human sign-off required" }
              requires_ai_recommendation: { type: boolean, description: "If true, human approval without prior AI review is flagged as misalignment" }
              step_weight: { type: integer, enum: [1, 2, 3], description: "Complexity multiplier for scoring (1=simple, 2=standard, 3=complex)" }
              blocked_reason: { type: string, nullable: true }
              blocked_since: { type: string, format: date-time, nullable: true }
        metrics:
          type: object
          description: Module-level metrics (included in dashboard response).
          properties:
            velocity_score: { type: integer, description: Net velocity score (bonus - penalty) }
            velocity_bonus: { type: integer, description: Points earned from forward progress }
            velocity_penalty: { type: integer, description: Points deducted from loopbacks/rejects }
            total_turns: { type: integer }
            loopback_count: { type: integer }
            ai_time_seconds: { type: integer }
            human_time_seconds: { type: integer }
            alignment_count: { type: integer, description: Steps completed with both human and AI participation }
            misalignment_count: { type: integer, description: Steps completed without both actors participating }
            outcome_score: { type: integer, nullable: true, minimum: 1, maximum: 5, description: Stakeholder satisfaction rating (set at deployment) }

    VelocityTurnResponse:
      type: object
      properties:
        pk_velocity_turn: { type: string, format: uuid }
        turn_actor: { type: string, enum: [human, ai] }
        turn_action: { type: string, enum: [start, pass, review, approve, reject, complete, block, unblock, note, send_back] }
        turn_from_status: { type: string, nullable: true }
        turn_to_status: { type: string, nullable: true }
        turn_content: { type: string, nullable: true }
        turn_content_json: { type: object, nullable: true }
        turn_attachments: { type: array, items: { type: object, properties: { filename: { type: string }, url: { type: string }, type: { type: string } } } }
        turn_user_email: { type: string, nullable: true, description: Login email of the human who made this move }
        turn_user_name: { type: string, nullable: true, description: Display name of the human }
        turn_api_key_id: { type: string, format: uuid, nullable: true, description: API key ID if this move was made by an AI agent }
        turn_is_aligned: { type: boolean, nullable: true, description: "Whether both human and AI participated before completion (null if not a completion turn)" }
        created_at: { type: string, format: date-time }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object }

    PaginatedResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: array, items: { type: object } }
        pagination:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            total: { type: integer }
            totalPages: { type: integer }

    # ─── Collaboration schemas (v4.0) ───

    ProjectMember:
      type: object
      properties:
        pk_project_member: { type: string, format: uuid }
        fk_pm_project:     { type: string, format: uuid }
        fk_pm_user:        { type: string, format: uuid }
        member_role:       { type: string, enum: [owner, collaborator] }
        added_by:          { type: string, format: uuid, nullable: true }
        added_at:          { type: string, format: date-time }
        removed_at:        { type: string, format: date-time, nullable: true }
        is_active:         { type: boolean }
        user_email_address: { type: string, format: email }
        user_display_name:  { type: string }
        avatar_url:         { type: string, nullable: true }

    ProjectPermissions:
      type: object
      description: Computed permission state for the authenticated user against a project.
      properties:
        projectId:   { type: string, format: uuid }
        isOpen:      { type: boolean, description: "True when project has zero active members" }
        isClaimed:   { type: boolean }
        isLocked:    { type: boolean }
        lockedBy:    { type: string, format: uuid, nullable: true }
        isMember:    { type: boolean }
        isOwner:     { type: boolean }
        isAdmin:     { type: boolean }
        cloneDisabled: { type: boolean }
        canRead:               { type: boolean }
        canWriteProject:       { type: boolean }
        canMakeVelocityMoves:  { type: boolean }
        canManageMembers:      { type: boolean }
        canRename:             { type: boolean }
        canToggleLock:         { type: boolean }
        canTogglePolicy:       { type: boolean }
        canClone:              { type: boolean }

    VersionRow:
      type: object
      description: One project in a cluster (parent or clone), with progress + lock + owner info.
      properties:
        pk_project:               { type: string, format: uuid }
        project_name:             { type: string }
        project_code:             { type: string, nullable: true }
        project_version_label:    { type: string, nullable: true }
        project_status:           { type: string, nullable: true }
        project_percent_complete: { type: integer, nullable: true }
        project_is_locked:        { type: boolean }
        project_locked_by:        { type: string, format: uuid, nullable: true }
        fk_project_parent:        { type: string, format: uuid, nullable: true }
        project_cloned_at:        { type: string, format: date-time, nullable: true }
        project_cloned_by:        { type: string, format: uuid, nullable: true }
        active_member_count:      { type: integer }
        primary_owner_email:      { type: string, format: email, nullable: true }
        primary_owner_name:       { type: string, nullable: true }

    Cluster:
      type: object
      properties:
        parent:   { allOf: [{ $ref: '#/components/schemas/VersionRow' }], nullable: true }
        versions:
          type: array
          items: { $ref: '#/components/schemas/VersionRow' }

    CloneInput:
      type: object
      properties:
        versionLabel: { type: string, maxLength: 200, nullable: true }
        copyLinks:    { type: boolean, default: true, description: "Copy project_link rows to the clone" }
        copyBudgets:  { type: boolean, default: false, description: "Copy budget lines (resets spent to 0)" }

    MemberAddInput:
      type: object
      required: [userId]
      properties:
        userId: { type: string, format: uuid }
        role:   { type: string, enum: [owner, collaborator], default: collaborator }

    MemberPatchInput:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [owner, collaborator] }

    LockInput:
      type: object
      properties:
        reason: { type: string, maxLength: 2000, nullable: true }

    UnlockInput:
      type: object
      properties:
        force: { type: boolean, default: false, description: "Admin-only — force-unlock a lock acquired by someone else" }

    TransferOwnershipInput:
      type: object
      required: [toUserId]
      properties:
        toUserId: { type: string, format: uuid }

    ClonePolicyInput:
      type: object
      required: [disabled]
      properties:
        disabled: { type: boolean }
        reason:   { type: string, maxLength: 2000, nullable: true }

    RenameVersionInput:
      type: object
      properties:
        label: { type: string, maxLength: 200, nullable: true }

    UserLookupResult:
      type: object
      properties:
        pk_user_account:   { type: string, format: uuid }
        user_email_address: { type: string, format: email }
        user_display_name:  { type: string }
        avatar_url:         { type: string, nullable: true }

paths:
  # ═══ Auth ═══
  /auth/google:
    get: { tags: [Auth], summary: Initiate Google SSO login, security: [] }
  /auth/google/callback:
    get: { tags: [Authentication], summary: Google OAuth2 callback (internal), security: [] }
  /auth/microsoft:
    get: { tags: [Authentication], summary: Initiate Microsoft SSO login, security: [] }
  /auth/microsoft/callback:
    get: { tags: [Authentication], summary: Microsoft OIDC callback (internal), security: [] }
  /auth/csrf:
    get:
      tags: [Auth]
      summary: Get CSRF token (for cookie-based auth only)
      security: []
      responses:
        200:
          description: CSRF token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object, properties: { csrfToken: { type: string } } }
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        200:
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      email: { type: string }
                      displayName: { type: string }
                      role: { type: string }
                      avatarUrl: { type: string, nullable: true }
  /auth/refresh:
    post: { tags: [Auth], summary: Refresh access token (cookie-based) }
  /auth/logout:
    post: { tags: [Auth], summary: Logout and revoke refresh token }

  # ═══ Projects ═══
  /projects:
    get:
      tags: [Projects]
      summary: List projects (paginated, filterable)
      security: []
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 500 } }
        - { name: search, in: query, schema: { type: string }, description: "Search name, description, demand number" }
        - { name: ministry, in: query, schema: { type: string }, description: "Filter by ministry code (e.g. TI)" }
        - { name: status, in: query, schema: { type: string, enum: [discovery, requirements, development, testing, client_review, client_acceptance, completion, on_hold, cancelled] } }
        - { name: sort, in: query, schema: { type: string, enum: [name, end_date, percent_complete, ministry, created_at], default: created_at } }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc], default: desc } }
        - { name: missionCritical, in: query, schema: { type: boolean }, description: "Filter by mission-critical flag" }
      responses:
        200: { description: Paginated project list, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedResponse' } } } }
    post:
      tags: [Projects]
      summary: Create project (auto-provisions SharePoint folders)
      description: |
        Creates a project record. **Side-effect (v5.1):** SharePoint folder
        hierarchy (`/Velo Projects/{ProjectName} (last4)/`, `/Audits/`,
        `/Requirements/`) is auto-provisioned in the background — the response
        does not wait for it. A `sharepoint_folders_created` SSE event is
        broadcast when the folders land (with `autoProvisioned: true`). If
        SharePoint is unconfigured or unreachable, the auto-provision fails
        silently (warn-logged) and project creation still succeeds.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ProjectInput' } } } }
      responses:
        201: { description: Project created, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessResponse' } } } }

  /projects/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Projects]
      summary: Get project with all sub-resources (modules, budgets, links, leads)
      security: []
      responses:
        200: { description: Full project detail }
    put:
      tags: [Projects]
      summary: Update project (all fields optional for partial update)
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/ProjectInput' } } } }
    delete:
      tags: [Projects]
      summary: Soft-delete project (recoverable by admin)

  /projects/{id}/merge:
    post:
      tags: [Projects]
      summary: Merge another project into this one (transfers all sub-resources, soft-deletes victim)
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid }, description: "Survivor project ID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mergeProjectId]
              properties:
                mergeProjectId: { type: string, format: uuid, description: "Project to merge in and delete" }

  # ═══ Modules ═══
  /projects/{id}/modules:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get: { tags: [Modules], summary: List modules, security: [] }
    post:
      tags: [Modules]
      summary: Create module (auto-extends SharePoint folder hierarchy)
      description: |
        Creates a module. A DB trigger inserts the 8 `module_velocity` rows automatically.
        **Side-effect (v5.1):** the SharePoint folder hierarchy for the parent project is
        re-ensured (idempotent), so the new module's folder + 8 step subfolders are added
        without requiring a manual "Create Folders" click. Fire-and-forget — failures are
        logged, never block the module create response.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ModuleInput' } } } }
      responses: { 201: { description: Module created } }

  /projects/{id}/modules/{moduleId}:
