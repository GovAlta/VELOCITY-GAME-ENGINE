  # ═══ Git — repo file browsing ═══
  # NOTE: Express mounts this as `GET /git/repos/:owner/:repo/files/*` —
  # the `*` is a wildcard segment (the file's repo-relative path, may contain `/`).
  # The literal `*` is preserved as the OpenAPI path key so docs-sync can match it.
  /git/repos/{owner}/{repo}/files/*:
    get:
      tags: [Git]
      summary: Read a single file from a repo (any depth — wildcard segment is the path)
      parameters:
        - { name: owner, in: path, required: true, schema: { type: string } }
        - { name: repo,  in: path, required: true, schema: { type: string } }

