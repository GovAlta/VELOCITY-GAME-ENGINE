  /admin/sse-sessions:
    get:
      tags: [Admin]
      summary: Live Velocity SSE session snapshot (grouped by api_key / user / IP)
      x-required-roles: [admin]
      description: |
        **Requires role: admin.**

        Returns an in-memory snapshot of every currently-connected Velocity SSE
        client on this Node process. Use to investigate connection surges and
        identify the api_key_id, user, or source IP responsible for high load.

        Returned groupings (each sorted descending by count, so a runaway caller
        is always first):
          - `byApiKey`: { apiKeyId, userEmail, userId, count, oldestConnectedAt }
          - `byUser`:   { userId, userEmail, count, oldestConnectedAt }
          - `byIp`:     { ip, count, oldestConnectedAt }
          - `byAuth`:   counts keyed by authSource (api_key | jwt | anonymous)
          - `sessions`: full list of active connections with userAgent + durationMs

        Per-identity concurrency caps are enforced at SSE connect time and
        configured via SSE_MAX_PER_API_KEY / SSE_MAX_PER_USER / SSE_MAX_PER_IP
        (defaults 5 each). A 6th concurrent connection from the same identity
        gets HTTP 429 + Retry-After: 60.

        Single-instance only — this endpoint reflects only the local Node
        process. On a multi-instance App Service, call each instance separately.
      responses:
        '200':
          description: Current SSE session snapshot

